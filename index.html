<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastSee</title>
  </head>
  <body>
    <div id="app">
      <div id="welcome-view" class="view active">
        <div class="welcome-content">
          <h1>FastSee</h1>
          <p>The fastest way to view your local images.</p>
          <button id="open-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            Open Folder
          </button>
          <div class="shortcuts-hint">
            <p><strong>Keyboard Shortcuts:</strong></p>
            <p><span>←</span> <span>→</span> Navigate</p>
            <p><span>+</span> <span>-</span> Zoom</p>
            <p><span>Esc</span> Back to grid</p>
          </div>
        </div>
      </div>

      <div id="grid-view" class="view hidden">
        <header class="top-bar">
          <div class="folder-info">
            <span id="folder-name">Selected Folder</span>
            <span class="file-count" id="file-count">0 images</span>
          </div>
          <button id="reopen-btn" class="icon-btn" title="Open another folder">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          </button>
        </header>
        <div class="grid-container" id="grid-container">
          <!-- Thumbnails will be injected here -->
        </div>
      </div>

      <div id="viewer-view" class="view hidden">
        <div class="viewer-overlay"></div>
        <div class="viewer-content">
          <img id="viewer-img" src="" alt="viewer" />
        </div>
        <div class="viewer-controls top-left">
          <button id="close-viewer-btn" class="icon-btn" title="Back to grid (Esc)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </button>
          <span id="viewer-filename" class="viewer-filename">filename.jpg</span>
        </div>
        
        <div class="viewer-controls bottom-center">
          <div class="zoom-level" id="zoom-level">100%</div>
          <button id="zoom-out-btn" class="icon-btn" title="Zoom Out (-)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
          </button>
          <button id="zoom-reset-btn" class="icon-btn" title="Reset Zoom">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          </button>
          <button id="zoom-in-btn" class="icon-btn" title="Zoom In (+)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
          </button>
        </div>

        <button id="prev-btn" class="nav-btn prev" title="Previous (←)">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button id="next-btn" class="nav-btn next" title="Next (→)">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
